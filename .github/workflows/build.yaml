name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2

      - name: Setup dependencies
        run: |
          sudo apt update
          sudo apt install -y protobuf-compiler
          corepack enable pnpm

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Setup Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install etcdctl
        env:
          ETCD_VER: v3.6.11
        run: |
          curl -fsSL "https://github.com/etcd-io/etcd/releases/download/${ETCD_VER}/etcd-${ETCD_VER}-linux-amd64.tar.gz" -o /tmp/etcd-${ETCD_VER}-linux-amd64.tar.gz
          tar xzf /tmp/etcd-${ETCD_VER}-linux-amd64.tar.gz -C /tmp
          sudo install /tmp/etcd-${ETCD_VER}-linux-amd64/etcdctl /usr/local/bin/etcdctl
          etcdctl version

      - name: Setup environment
        run: sudo docker compose -f ci/docker-compose.yaml up -d

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #2.9.1

      - name: Cache UI build
        id: ui-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
        with:
          path: crates/admin-ui/ui-dist
          key: ui-dist-${{ hashFiles('crates/admin-ui/ui/src/**',
            'crates/admin-ui/ui/index.html',
            'crates/admin-ui/ui/vite.config.ts',
            'crates/admin-ui/ui/tsconfig*.json',
            'crates/admin-ui/ui/package.json',
            'crates/admin-ui/ui/pnpm-lock.yaml', 'crates/admin-ui/build.rs',
            'crates/admin-ui/Cargo.toml') }}

      - name: Build UI
        if: steps.ui-cache.outputs.cache-hit != 'true'
        run: cargo build -p aisix-admin-ui --features build-ui -vv

      - name: Run Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Build
        run: cargo build --locked

      - name: Run Test
        run: cargo test --workspace --locked

      - name: Run E2E Test
        run: |
          pnpm -C tests install --frozen-lockfile
          pnpm -C tests test

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # 7.0.0
        with:
          name: binary-debug
          path: target/debug/aisix
